# Build & chạy API + SPA (nginx) + MySQL + Redis — kiểm tra trước khi deploy Azure
# Dùng: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# Frontend gọi API qua http://localhost:4000/api (trình duyệt trên máy host).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: dack
      DB_USER: root
      DB_PASS: root
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-docker-compose-dev-change-me}
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
