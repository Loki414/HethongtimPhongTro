services:
  mysql:
    image: mysql:8.0
    container_name: dack-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dack
    volumes:
      - dack-mysql-data:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: dack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dack-redis-data:/data

volumes:
  dack-mysql-data:
  dack-redis-data:

